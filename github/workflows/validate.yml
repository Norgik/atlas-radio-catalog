name: Validate Catalog

on:
  push:
    paths:
      - "remote_catalog.json"
  pull_request:
    paths:
      - "remote_catalog.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate remote_catalog.json
        run: python3 validate_catalog.py
